<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uiy Uiy Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- EKRAN 1: Karakter Seçimi -->
    <div id="setup-screen">
        <div class="setup-container">
            <h1 class="game-title">Uiy Uiy Toe</h1>
            <p class="subtitle">Her oyuncu için bir karakter seçin</p>

            <div class="setup-players">
                <div class="setup-card">
                    <div class="setup-card-header">
                        <div class="player-icon p1-icon">1</div>
                        <div>
                            <div class="player-label">1. Oyuncu</div>
                            <div class="selected-char p1-color" id="p1-selected-display">X</div>
                        </div>
                    </div>
                    <div class="letter-grid" id="p1-grid"></div>
                </div>

                <div class="setup-card">
                    <div class="setup-card-header">
                        <div class="player-icon p2-icon">2</div>
                        <div>
                            <div class="player-label">2. Oyuncu</div>
                            <div class="selected-char p2-color" id="p2-selected-display">O</div>
                        </div>
                    </div>
                    <div class="letter-grid" id="p2-grid"></div>
                </div>
            </div>

            <button id="start-button">Oyunu Başlat ▶</button>
        </div>
    </div>

    <!-- EKRAN 2: Oyun -->
    <div id="game-screen" class="hidden">
        <h1 class="game-title">Uiy Uiy Toe</h1>
        <div class="game-card">
            <div class="notch"></div>
            <div class="score-board">
                <div class="score p1-score-card">
                    <span class="score-char" id="p1-label">X</span>
                    <span class="score-num" id="p1-score">0</span>
                </div>
                <div class="score-divider">:</div>
                <div class="score p2-score-card">
                    <span class="score-char" id="p2-label">O</span>
                    <span class="score-num" id="p2-score">0</span>
                </div>
            </div>
            <div id="game-board">
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
                <div class="cell" data-cell></div>
            </div>
        </div>
        <div id="game-status-bar">
            <span id="turn-indicator"></span>
            <span id="game-status"></span>
        </div>
        <div class="game-buttons">
            <button id="restart-button">Yeniden Başlat</button>
            <button id="back-button">Karakter Seç</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
